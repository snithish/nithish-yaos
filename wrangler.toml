name = "nithish-yaos"
main = "src/index.ts"
compatibility_date = "2026-03-02"

[[durable_objects.bindings]]
name = "YAOS_SYNC"
class_name = "VaultSyncServer"

[[durable_objects.bindings]]
name = "YAOS_CONFIG"
class_name = "ServerConfig"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["VaultSyncServer"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["ServerConfig"]

[[r2_buckets]]
binding = "YAOS_BUCKET"
bucket_name = "nithish-yaos"

[observability.logs]
enabled = true
